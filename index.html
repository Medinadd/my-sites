<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Sites — Medina</title>
  <meta name="description" content="Portfolio of conversion landing pages for Kazakh education businesses." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d12;
      --surface: #161821;
      --surface-2: #1d2030;
      --border: #262a3a;
      --text: #e7e9f0;
      --muted: #8a8fa3;
      --accent: #7c8cff;
      --accent-hover: #6273ee;
      --success: #4caf7d;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 56px 20px 80px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      font-size: 1.75rem;
      letter-spacing: -0.01em;
      color: #fff;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--surface-2);
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      font-size: 1.15rem;
      flex-shrink: 0;
    }

    .name {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    .label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .url {
      font-size: 0.85rem;
      color: #93a3ff;
      font-family: 'SF Mono', Menlo, monospace;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: var(--surface-2);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-copy.copied {
      border-color: var(--success);
      color: var(--success);
    }

    footer {
      margin-top: 56px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--muted);
    }

    @media (max-width: 480px) {
      body { padding: 32px 14px 60px; }
      .grid { grid-template-columns: 1fr; gap: 10px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>My Sites</h1>
      <p class="subtitle">Conversion landing pages for Kazakh education businesses, plus the CMS that powers them.</p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
      Built by Medina · <a href="mailto:medinakasen@gmail.com">medinakasen@gmail.com</a>
    </footer>
  </div>

  <script>
    const SITES = [
      { icon: '🤎', name: 'Merey Kassen', label: 'Sales site — sites for KZ businesses', url: 'https://site-nu-ashen-55.vercel.app' },
      { icon: '🎓', name: 'Abay Academy', label: 'Онлайн-школа 2–11 классы', url: 'https://abay-academy.vercel.app' },
      { icon: '✈️', name: 'JET EDUCATION', label: 'Магистратура дайындығы', url: 'https://jet-education-medina.vercel.app' },
      { icon: '📚', name: 'StudyRoom', label: 'IELTS, SAT, поступление за рубеж · Алматы', url: 'https://studyroom-medina.vercel.app' },
      { icon: '📖', name: 'IQRA Academy', label: 'Онлайн-курс казахского языка', url: 'https://iqra-academy-medina.vercel.app' },
      { icon: '🇬🇧', name: 'Just To Study', label: 'Онлайн-школа английского', url: 'https://just-to-study.vercel.app' },
      { icon: '📝', name: 'Айгүл Баядил', label: 'IELTS мұғалімі (original)', url: 'https://aigul-bayadil.vercel.app' },
      { icon: '🎯', name: 'IELTS Tutor', label: 'Genericized demo (no personal info)', url: 'https://ielts-tutor-pi.vercel.app' },
      { icon: '∑',  name: 'Math Elena',  label: 'Математика 10–11 класс · ЕНТ 2026',     url: 'https://math-elena.vercel.app' },
      { icon: '🌲', name: 'Русский Лес', label: 'Пиломатериалы оптом и в розницу', url: 'https://almatyforhome.xyz' },
      { icon: '⚙️', name: 'Admin Panel', label: 'CMS for site owners', url: 'https://medina-admin.vercel.app' },
    ];

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function urlPretty(u) {
      return u.replace(/^https?:\/\//, '').replace(/\/$/, '');
    }

    const grid = document.getElementById('grid');
    SITES.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-head">
          <div class="icon">${s.icon}</div>
          <div>
            <div class="name">${escHtml(s.name)}</div>
            <div class="label">${escHtml(s.label)}</div>
          </div>
        </div>
        <div class="url">${escHtml(urlPretty(s.url))}</div>
        <div class="actions">
          <button class="btn btn-copy" data-i="${i}" title="Copy URL">Copy</button>
          <a class="btn btn-primary" href="${escHtml(s.url)}" target="_blank" rel="noopener">Visit →</a>
        </div>
      `;
      grid.appendChild(card);
    });

    grid.addEventListener('click', e => {
      const btn = e.target.closest('.btn-copy');
      if (!btn) return;
      const i = +btn.dataset.i;
      navigator.clipboard.writeText(SITES[i].url).then(() => {
        const original = btn.textContent;
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = original;
          btn.classList.remove('copied');
        }, 1400);
      });
    });
  </script>
</body>

</html>
