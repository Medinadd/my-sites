<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Sites — Medina</title>
  <meta name="description" content="Portfolio of conversion landing pages for Kazakh education businesses." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d12;
      --border: #262a3a;
      --text: #e7e9f0;
      --muted: #8a8fa3;
      --accent: #93a3ff;
      --ok: #6ee7b7;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 56px 20px 80px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: -0.01em;
      color: #fff;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
    }

    section {
      margin-top: 28px;
    }

    h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    h2 .count {
      color: #4a4f63;
      font-weight: 500;
    }

    ul {
      list-style: none;
      border-top: 1px solid var(--border);
    }

    li {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border);
    }

    li > a {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex: 1;
      min-width: 0;
      color: var(--text);
      text-decoration: none;
    }

    li > a:hover { color: var(--accent); }
    li > a:hover .num,
    li > a:hover .url { color: var(--accent); }

    .num {
      color: var(--muted);
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', Menlo, monospace;
      min-width: 22px;
      flex-shrink: 0;
    }

    .name {
      font-weight: 500;
      flex-shrink: 0;
    }

    .label {
      color: var(--muted);
      font-size: 0.85rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .url {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'SF Mono', Menlo, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 35%;
    }

    .copy {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .copy.copied {
      color: var(--ok);
      border-color: var(--ok);
    }

    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    footer a { color: var(--muted); }

    @media (max-width: 540px) {
      body { padding: 32px 14px 60px; }
      h1 { font-size: 1.25rem; }
      .label { display: none; }
      .url { max-width: 50%; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>My Sites</h1>
      <p class="subtitle">Conversion landing pages for Kazakh education businesses, plus the CMS that powers them.</p>
    </header>

    <div id="groups"></div>

    <footer>
      Built by Medina · <a href="mailto:medinakasen@gmail.com">medinakasen@gmail.com</a>
    </footer>
  </div>

  <script>
    const GROUPS = [
      {
        title: 'Mine',
        items: [
          { name: 'Merey Kassen', label: 'Sales site — sites for KZ businesses', url: 'https://site-nu-ashen-55.vercel.app' },
          { name: 'Admin Panel', label: 'CMS for site owners', url: 'https://medina-admin.vercel.app' },
        ],
      },
      {
        title: 'Sold',
        items: [
          { name: 'Русский Лес', label: 'Пиломатериалы оптом и в розницу', url: 'https://almatyforhome.xyz' },
        ],
      },
      {
        title: 'Spec sites',
        items: [
          { name: 'Abay Academy', label: 'Онлайн-школа 2–11 классы', url: 'https://abay-academy.vercel.app' },
          { name: 'JET EDUCATION', label: 'Магистратура дайындығы', url: 'https://jet-education-medina.vercel.app' },
          { name: 'StudyRoom', label: 'IELTS, SAT, поступление за рубеж · Алматы', url: 'https://studyroom-medina.vercel.app' },
          { name: 'IQRA Academy', label: 'Онлайн-курс казахского языка', url: 'https://iqra-academy-medina.vercel.app' },
          { name: 'Just To Study', label: 'Онлайн-школа английского', url: 'https://just-to-study.vercel.app' },
          { name: 'Айгүл Баядил', label: 'IELTS мұғалімі (original)', url: 'https://aigul-bayadil.vercel.app' },
          { name: 'Langley Education', label: 'IELTS, TOEFL, English, Türkçe, 한국어', url: 'https://langley-six.vercel.app' },
          { name: 'IELTS Tutor', label: 'Genericized demo (no personal info)', url: 'https://ielts-tutor-pi.vercel.app' },
          { name: 'Math Elena', label: 'Математика 10–11 класс · ЕНТ 2026', url: 'https://math-elena.vercel.app' },
          { name: 'Tatyana Forat', label: 'IELTS-teacher trainer · Instagram course-launch mentorship', url: 'https://tatyana-forat.vercel.app' },
          { name: 'Space English', label: 'Ағылшын мектебі · бір айда екі деңгей', url: 'https://space-english.vercel.app' },
          { name: 'Welltone Academy', label: 'IELTS · SAT · admission в зарубежные университеты', url: 'https://welltone-academy.vercel.app' },
          { name: 'High Dreamers', label: 'Подготовка к IELTS · онлайн-академия', url: 'https://high-dreamers.vercel.app' },
          { name: 'SAT Academy', label: 'SAT · IELTS · поступление за рубеж · Алматы', url: 'https://sat-academy-two.vercel.app' },
          { name: 'Inter Press', label: 'Школа английского · Шымкент · Kids → IELTS', url: 'https://inter-press.vercel.app' },
          { name: 'Дарья IELTS', label: 'Puzzle IELTS · 2-месячный онлайн-курс · band 7.0+', url: 'https://daryaa-ielts.vercel.app' },
          { name: 'SHAMSHYRAQ Школа', label: 'Бастауыш мектеп · 0–4 классы · Cambridge · Алматы', url: 'https://shamshyraq.vercel.app' },
        ],
      },
    ];

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function urlPretty(u) {
      return u.replace(/^https?:\/\//, '').replace(/\/$/, '');
    }

    async function copy(btn, url) {
      try {
        await navigator.clipboard.writeText(url);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      const prev = btn.textContent;
      btn.textContent = 'copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = prev;
        btn.classList.remove('copied');
      }, 1200);
    }

    const groupsEl = document.getElementById('groups');

    GROUPS.forEach((g) => {
      const section = document.createElement('section');
      const pad = String(g.items.length).length;
      section.innerHTML = `
        <h2>${escHtml(g.title)} <span class="count">${g.items.length}</span></h2>
        <ul></ul>
      `;
      const ul = section.querySelector('ul');
      g.items.forEach((s, i) => {
        const n = String(i + 1).padStart(pad, '0');
        const li = document.createElement('li');
        li.innerHTML = `
          <a href="${escHtml(s.url)}" target="_blank" rel="noopener">
            <span class="num">${n}</span>
            <span class="name">${escHtml(s.name)}</span>
            <span class="label">${escHtml(s.label)}</span>
            <span class="url">${escHtml(urlPretty(s.url))}</span>
          </a>
          <button class="copy" type="button" aria-label="Copy link">copy</button>
        `;
        const btn = li.querySelector('.copy');
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          copy(btn, s.url);
        });
        ul.appendChild(li);
      });
      groupsEl.appendChild(section);
    });
  </script>
</body>

</html>
